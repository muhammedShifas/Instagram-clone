<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagramlogin</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="container1">
        <!-- section 1 for picture ad -->
            <section class="left">
                <img src="instapic-removebg-preview.png" class="logo" alt="">
                <div class="subsection">
                    <p style="color: white;">See everyday moments from your</p>
                    <p class="instacolor">close friends<span style="-webkit-text-fill-color: white;">.</span></p>
                    <img src="instareels-removebg-preview.png" style="width: 550px; height: 430px; margin-bottom: 50px; padding-bottom: 20px;" alt="">
                </div>
            </section>
            <!-- section 2 for login-->
            <section class="right">
                <div class="login">
                    <div class="circle"><i class="fa-solid fa-angle-left"></i></div>
                    <p>Log in to Instagram</p>
                </div>
                <div class="content">
                    <div class="input1">
                        <input type="text" placeholder="Mobile number,username or emailaddress">
                    </div>
                    <div class="input1">
                        <input type="password" placeholder="Password">
                    </div>
                    <div class="button1">
                        <button>log in</button>
                    </div>
                    <div class="button2">
                        <button>Forgotten password?</button>
                    </div>
                    <div class="button3">
                        <button><i class="fa-brands fa-facebook" style="color: rgb(47, 143, 252);"></i>Log in with Facebook</button>
                    </div>
                    <div class="button4">
                        <button>Create new account</button>
                    </div>
                    <footer style="color: #DEE3E9; font-size: 16px; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-left: 240px; margin-top: 15px;"><i class="fa-brands fa-meta"></i> Meta</footer>
                </div>
            </section>
        </div>
        <div class="container2">
            <footer class="footerupper">
                <p class="p1">Meta</p>
                <p class="p1">About</p>
                <p class="p1">Blog</p>
                <p class="p1">Jobs</p>
                <p class="p1">Help</p>
                <p class="p1">API</p>
                <p class="p1">Privacy</p>
                <p class="p1">Terms</p>
                <p class="p1">Locations</p>
                <p class="p1">Popular</p>
                <p class="p1">Instagram Lite</p>
                <p class="p1">Meta AI</p>
                <p class="p1">Threads</p>
                <p class="p1">Contact uploading and non-users</p>
                <p class="p1">Meta Verified</p>
            </footer>
            <footer class="footerbottom">
                <p style="cursor: pointer;">English <span style="cursor: pointer;"><i class="fa-solid fa-chevron-down"></i></span></p> <p> © 2026 Instagram from Meta</p>
            </footer>
        </div>
    </div>
</body>
</html>
