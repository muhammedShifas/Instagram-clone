<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagramlogin</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="container1">
        <!-- section 1 for picture ad -->
            <section class="left">
                <img src="instapic-removebg-preview.png" class="logo" alt="">
                <div class="subsection">
                    <p style="color: white;">See everyday moments from your</p>
                    <p class="instacolor">close friends<span style="-webkit-text-fill-color: white;">.</span></p>
                    <img src="instareels-removebg-preview.png" style="width: 550px; height: 430px; margin-bottom: 50px; padding-bottom: 20px;" alt="">
                </div>
            </section>
            <!-- section 2 for login-->
            <section class="right">
                <div class="login">
                    <div class="circle"><i class="fa-solid fa-angle-left"></i></div>
                    <p>Log in to Instagram</p>
                </div>
                <div class="content">
                    <div class="input1">
                        <input type="text" placeholder="Mobile number,username or emailaddress">
                    </div>
                    <div class="input1">
                        <input type="password" placeholder="Password">
                    </div>
                    <div class="button1">
                        <button>log in</button>
                    </div>
                    <div class="button2">
                        <button>Forgotten password?</button>
                    </div>

                </div>
            </section>
        </div>
        <div class="container2">

        </div>
    </div>
</body>
</html>
